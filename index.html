<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18 de Maio — Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:     #FF6B1A;
      --orange-lt:  #FF8C42;
      --pink:       #FF3E82;
      --pink-lt:    #FF6FA3;
      --white:      #FFFFFF;
      --off-white:  #FFF8F5;
      --text:       #1A0A00;
      --muted:      #8A5040;
    }

    html, body {
      min-height: 100vh;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--orange); top: -120px; left: -120px; }
    .blob-2 { width: 420px; height: 420px; background: var(--pink);   bottom: -100px; right: -100px; }
    .blob-3 { width: 300px; height: 300px; background: var(--orange-lt); bottom: 60px; left: 30%; opacity: 0.12; }

    .dots { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .dot  { position: absolute; border-radius: 50%; animation: float linear infinite; }

    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      color: #fff;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(255,107,26,0.35);
      animation: fadeDown 0.6s ease both;
    }
    .badge::before { content: "✦"; font-size: 0.6rem; }
    .badge::after  { content: "✦"; font-size: 0.6rem; }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      margin-bottom: 8px;
      animation: fadeDown 0.7s ease 0.1s both;
    }
    .headline .num {
      background: linear-gradient(135deg, var(--orange) 20%, var(--pink) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .headline .de   { font-style: italic; color: var(--muted); font-size: 0.6em; }
    .headline .maio { color: var(--text); }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: 0.04em;
      animation: fadeDown 0.7s ease 0.2s both;
    }

    .card {
      background: var(--white);
      border: 1.5px solid rgba(255,107,26,0.15);
      border-radius: 28px;
      padding: 48px 44px;
      width: 100%;
      max-width: 680px;
      box-shadow:
        0 2px 8px rgba(255,107,26,0.06),
        0 20px 60px rgba(255,62,130,0.10),
        0 60px 100px rgba(0,0,0,0.04);
      animation: riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s both;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 36px 24px; }
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid rgba(255,107,26,0.2);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      background: var(--off-white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field input::placeholder { color: #C4A090; }
    .field input:focus {
      border-color: var(--orange);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,107,26,0.12);
    }
    .phone-field:focus {
      border-color: var(--pink) !important;
      box-shadow: 0 0 0 4px rgba(255,62,130,0.12) !important;
    }

    .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,107,26,0.2), rgba(255,62,130,0.2), transparent);
      margin: 4px 0;
    }

    .btn-wrap { grid-column: 1 / -1; margin-top: 8px; }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(255,107,26,0.38);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,107,26,0.45); }
    .btn:active { transform: translateY(0);    box-shadow: 0 6px 20px rgba(255,107,26,0.35); }

    .success-msg {
      grid-column: 1 / -1;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px;
      background: linear-gradient(135deg, rgba(255,107,26,0.06), rgba(255,62,130,0.06));
      border-radius: 16px;
      text-align: center;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .success-msg.show { display: flex; }
    .success-icon { font-size: 2.5rem; }
    .success-msg h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--orange); }
    .success-msg p  { font-size: 0.9rem; color: var(--muted); }

    .footer {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      animation: fadeUp 0.7s ease 0.5s both;
    }
    .footer span {
      background: linear-gradient(135deg, var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 500;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="dots" id="dots"></div>

    <div class="card">
      <form id="eventForm">
        <div class="form-grid">

          <div class="field">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome"
              autocomplete="name"
              required
            />
          </div>

          <div class="field">
            <label for="telefone">Telefone / WhatsApp</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(00) 00000-0000"
              autocomplete="tel"
              class="phone-field"
              required
            />
          </div>

          <div class="divider"></div>

          <div class="btn-wrap">
            <button type="submit" class="btn">Confirmar Presença ✦</button>
          </div>

          <div class="success-msg" id="successMsg">
            <div class="success-icon">🎉</div>
            <h3>Presença confirmada!</h3>
          </div>

        </div>
      </form>
    </div>


  <script>
    /* Floating dots */
    const dotsEl = document.getElementById('dots');
    const colors = ['#FF6B1A','#FF8C42','#FF3E82','#FF6FA3','#FFB347','#FF85A1'];
    for (let i = 0; i < 28; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = Math.random() * 10 + 4;
      d.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*12+8}s;
        animation-delay:${Math.random()*10}s;
        opacity:0;
      `;
      dotsEl.appendChild(d);
    }

    /* Phone mask */
    document.getElementById('telefone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 6)      v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
      else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
      else if (v.length)     v = `(${v}`;
      this.value = v;
    });

    /* Form submit */
    document.getElementById('eventForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = this.querySelector('.btn');
      btn.textContent = 'Enviando…';
      btn.disabled = true;
      setTimeout(() => {
        btn.style.display = 'none';
        document.getElementById('successMsg').classList.add('show');
      }, 900);
    });
  </script>
</body>
</html>
